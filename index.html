<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>انتهى وقت الامتحان</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tahoma', 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #1a2a3a 0%, #0d1b2a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 48px;
            padding: 50px 40px;
            max-width: 600px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(2px);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: scale(1.02);
        }

        .icon {
            font-size: 80px;
            margin-bottom: 20px;
            display: inline-block;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            color: #c0392b;
            margin-bottom: 20px;
            letter-spacing: -1px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .message {
            font-size: 1.3rem;
            color: #2c3e50;
            margin-bottom: 30px;
            line-height: 1.6;
            background: #f8f9fa;
            padding: 15px 20px;
            border-radius: 60px;
            display: inline-block;
            border-right: 5px solid #e74c3c;
        }

        .time-info {
            background: #ecf0f1;
            padding: 20px;
            border-radius: 32px;
            margin: 20px 0;
            font-size: 1.1rem;
            color: #2c3e50;
        }

        .time-info span {
            font-weight: bold;
            color: #e67e22;
            font-size: 1.3rem;
        }

        button {
            background: #c0392b;
            border: none;
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            padding: 14px 28px;
            border-radius: 40px;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            font-family: inherit;
        }

        button:hover {
            background: #a82315;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        button:active {
            transform: translateY(2px);
        }

        .footer {
            margin-top: 30px;
            font-size: 0.8rem;
            color: #7f8c8d;
            border-top: 1px solid #ddd;
            padding-top: 20px;
        }

        @media (max-width: 500px) {
            .card {
                padding: 30px 20px;
            }
            h1 {
                font-size: 2.2rem;
            }
            .message {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">⏰</div>
        <h1>🚨 انتهى وقت الامتحان 🚨</h1>
        <div class="message">
            📢 تم إنهاء الاختبار تلقائياً
        </div>
        <div class="time-info">
            ⏱️ لم يتم قبول أي إجابات بعد <span>9:15</span><br>
        </div>
        <div class="footer">
            جميع الحقوق محفوظة © نظام الاختبارات الإلكترونية
        </div>
    </div>

    <script>
        function showAlert() {
            alert("✅ تم تسليم الامتحان بنجاح. نشكرك على التزامك.");
        }

        // تأثير إضافي: عرض وقت الانتهاء الفعلي
        function displayEndTime() {
            const now = new Date();
            const options = { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true };
            const timeStr = now.toLocaleTimeString('ar-EG', options);
            if (timeInfo && !timeInfo.querySelector('.real-time')) {
                const realTimeSpan = document.createElement('div');
                realTimeSpan.style.marginTop = '15px';
                realTimeSpan.style.fontSize = '0.9rem';
                realTimeSpan.style.color = '#e67e22';
                realTimeSpan.className = 'real-time';
                timeInfo.appendChild(realTimeSpan);
            }
        }
        displayEndTime();
    </script>
</body>
</html>
